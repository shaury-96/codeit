
 {%extends 'layout.html'%}
{%block body%}
<!--  --------------------------------------------------------post started here----------------------------------------    -->
    {%for po in post%}
    <div class=md-content data-md-component=content>
                <div class=md-content__inner>
                    <header class=md-typeset></header>
                    <article class="md-post md-post--excerpt">
                        <header class=md-post__header>
                            <nav class="md-post__authors md-typeset"><span class=md-author> <img
                                    src=https://avatars.githubusercontent.com/u/5679861 alt="Roman Dodin"> </span></nav>
                            <div class="md-post__meta md-meta">
                                <ul class=md-meta__list>
                                    <li class=md-meta__item>
<!--                                        <time datetime="2023-03-21 00:00:00">{{post.date}}</time>-->
                                            {{po.datetime}}
                                    </li>
<!--                                    <li class=md-meta__item> 1 min read</li>-->
                                </ul>
                            </div>
                        </header>


                        <div class="md-post__content md-typeset">
                            <h2 id=gnmic-talks-at-dknog-and-nanog><a
                                    href="post/{{po.slug}}">{{po.title}}</a></h2>
                            {{po.content[0:100]}}
                            <nav class=md-post__action><a href="post/{{po.slug}}"> Continue
                                reading </a>
                            </nav>
                        </div>
                    </article>
                    {%endfor%}

<!--  ------------------------------------post ended----------------------------------------------             -->


                    <nav class=md-pagination><span class=md-pagination__current>1</span> <a
                            href=page/2/ class=md-pagination__link>2</a> <a href=page/3/ class=md-pagination__link>3</a>
                        <span class=md-pagination__dots>..</span> <a href=page/6/ class=md-pagination__link>6</a></nav>
                </div>
            </div>
            <script>
                    var target = document.getElementById(location.hash.slice(1));
                    target && target.name && (target.checked = target.name.startsWith("__tabbed_"))

            </script>
        </div>

{%endblock%}
